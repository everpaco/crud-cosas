<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard - CRUD</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;padding:24px}
    .wrap{max-width:900px;margin:0 auto}
    .card{background:#fff;padding:16px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.06);margin-bottom:12px}
    input,select,textarea{width:100%;padding:8px;margin:6px 0;border:1px solid #ddd;border-radius:4px}
    button{padding:10px 14px;border:0;background:#0066ff;color:#fff;border-radius:4px;cursor:pointer}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    pre{background:#111;color:#bada55;padding:12px;border-radius:6px;overflow:auto}
    table th, table td{padding:8px 10px;border-bottom:1px solid #f0f0f0;text-align:left}
    table thead th{background:#fafafa}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h2>Panel Admin</h2>
      <div>
        <button id="logout">Cerrar sesión</button>
      </div>
    </header>

    <div class="card">
      <h3>Crear Categoría</h3>
      <form id="categoriaForm">
        <input id="catNombre" placeholder="Nombre" required />
        <textarea id="catDescripcion" placeholder="Descripción"></textarea>
        <button id="catSubmit" type="submit">Crear categoría</button>
      </form>
      <div style="margin-top:8px"><span id="catMsg">&nbsp;</span></div>
    </div>

    <div class="card">
      <h3>Crear Mueble</h3>
      <form id="muebleForm">
        <input id="muebleNombre" placeholder="Nombre" required />
        <input id="muebleTipo" placeholder="Tipo" />
        <input id="muebleCosto" type="number" step="0.01" placeholder="Costo" />
        <select id="muebleCategoria"></select>
        <button id="muebleSubmit" type="submit">Crear mueble</button>
      </form>
      <div style="margin-top:8px"><span id="muebleMsg">&nbsp;</span></div>
    </div>

    <div class="card">
      <h3>Categorías existentes</h3>
      <div id="catsLoading">Cargando...</div>
      <table id="catsTable" border="0" style="width:100%;display:none;border-collapse:collapse">
        <thead><tr><th style="text-align:left">Nombre</th><th>Descripción</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h3>Muebles existentes</h3>
      <div id="mueblesLoading">Cargando...</div>
      <table id="mueblesTable" border="0" style="width:100%;display:none;border-collapse:collapse">
        <thead><tr><th>Nombre</th><th>Tipo</th><th>Costo</th><th>Categoría</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const authHeaders = token ? { 'Authorization': 'Bearer ' + token, 'Content-Type':'application/json' } : { 'Content-Type':'application/json' };
    const el = id => document.getElementById(id);

    if(!token){ alert('No autenticado. Redirigiendo a login.'); window.location.href = '/'; }

    function showToast(message, ok=true){
      const el = document.createElement('div');
      el.textContent = message; el.style.padding='8px 12px'; el.style.margin='8px 0'; el.style.borderRadius='6px';
      el.style.background = ok? '#e6ffed' : '#ffe6e6'; el.style.color = ok? '#0a6b2a' : '#8a1f16';
      document.querySelector('.wrap').prepend(el);
      setTimeout(()=>el.remove(),3500);
    }

    const API_BASE = window.__API_URL__ || '';
    async function loadCategorias(){
      try{
        const res = await fetch(API_BASE + '/categorias');
        const data = await res.json();
        const table = el('catsTable'); const tbody = table.querySelector('tbody'); tbody.innerHTML='';
        const sel = el('muebleCategoria'); sel.innerHTML = '';
        if(Array.isArray(data) && data.length){
          data.forEach(c=>{
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${c.nombre}</td><td>${c.descripcion||''}</td><td><button data-id="${c.id}" class="delCat">Eliminar</button></td>`;
            tbody.appendChild(tr);
            const opt = document.createElement('option'); opt.value = c.id; opt.textContent = c.nombre; sel.appendChild(opt);
          });
          table.style.display='table'; el('catsLoading').style.display='none';
        } else { el('catsLoading').textContent='(sin categorías)'; table.style.display='none'; }
      }catch(err){ el('catsList').innerHTML = '<li>Error: '+err.message+'</li>'; }
    }

    async function loadMuebles(){
      try{
        const res = await fetch(API_BASE + '/muebles');
        const data = await res.json();
        const table = el('mueblesTable'); const tbody = table.querySelector('tbody'); tbody.innerHTML='';
        if(Array.isArray(data) && data.length){
          data.forEach(m=>{
            const catName = m.categoria? m.categoria.nombre : (m.categoriaId || '');
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${m.nombre}</td><td>${m.tipo||''}</td><td>${m.costo||''}</td><td>${catName}</td><td><button data-id="${m.id}" class="delMueble">Eliminar</button></td>`;
            tbody.appendChild(tr);
          });
          table.style.display='table'; el('mueblesLoading').style.display='none';
        } else { el('mueblesLoading').textContent='(sin muebles)'; table.style.display='none'; }
      }catch(err){ el('mueblesLoading').textContent = 'Error: '+err.message; }
    }

    document.getElementById('categoriaForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const nombre = el('catNombre').value.trim();
      const descripcion = el('catDescripcion').value.trim();
      const btn = el('catSubmit'); btn.disabled=true; showToast('Creando categoría...', true);
      try{
        const res = await fetch(API_BASE + '/categorias', { method:'POST', headers: authHeaders, body: JSON.stringify({ nombre, descripcion }) });
        const data = await res.json();
        if(!res.ok) { showToast(data.message||'Error', false); }
        else { showToast('Categoría creada'); el('catNombre').value=''; el('catDescripcion').value=''; }
        await loadCategorias();
      }catch(err){ showToast(err.message,false); }
      btn.disabled=false;
    });

    document.getElementById('muebleForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const nombre = el('muebleNombre').value.trim();
      const tipo = el('muebleTipo').value.trim();
      const costo = parseFloat(el('muebleCosto').value) || 0;
      const categoriaId = el('muebleCategoria').value;
      const btn = el('muebleSubmit'); btn.disabled=true; showToast('Creando mueble...', true);
      try{
        const res = await fetch(API_BASE + '/muebles', { method:'POST', headers: authHeaders, body: JSON.stringify({ nombre, tipo, costo, categoriaId }) });
        const data = await res.json();
        if(!res.ok) { showToast(data.message||'Error',false); }
        else { showToast('Mueble creado'); el('muebleNombre').value=''; el('muebleTipo').value=''; el('muebleCosto').value=''; }
        await loadMuebles();
      }catch(err){ showToast(err.message,false); }
      btn.disabled=false;
    });

    // delegación de eventos para eliminar
    document.addEventListener('click', async (ev)=>{
      if(ev.target.classList.contains('delCat')){
        const id = ev.target.dataset.id;
        const row = ev.target.closest('tr');
        const name = row ? row.children[0].textContent : id;
        if(!confirm('Eliminar categoría "'+name+'"?')) return;
        try{
          const res = await fetch(API_BASE + '/categorias/'+id, { method:'DELETE', headers: authHeaders });
          const data = await res.json(); if(!res.ok) showToast(data.message||'Error',false); else showToast('Categoría eliminada');
          await loadCategorias(); await loadMuebles();
        }catch(err){ showToast(err.message,false); }
      }
      if(ev.target.classList.contains('delMueble')){
        const id = ev.target.dataset.id;
        const row = ev.target.closest('tr');
        const name = row ? row.children[0].textContent : id;
        if(!confirm('Eliminar mueble "'+name+'"?')) return;
        try{
          const res = await fetch(API_BASE + '/muebles/'+id, { method:'DELETE', headers: authHeaders });
          const data = await res.json(); if(!res.ok) showToast(data.message||'Error',false); else showToast('Mueble eliminada');
          await loadMuebles();
        }catch(err){ showToast(err.message,false); }
      }
    });

    document.getElementById('logout').addEventListener('click', ()=>{ localStorage.removeItem('token'); window.location.href = '/'; });

    // cargar al iniciar
    (async function(){
      await loadCategorias();
      await loadMuebles();
    })();
  </script>
</body>
</html>
