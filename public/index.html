<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - CRUD</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;background:#f5f5f5}
    .card{background:#fff;padding:24px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.06);width:320px}
    input{width:100%;padding:8px;margin:8px 0;border:1px solid #ddd;border-radius:4px}
    button{width:100%;padding:10px;border:0;background:#0066ff;color:#fff;border-radius:4px;cursor:pointer}
    pre{background:#111;color:#bada55;padding:12px;border-radius:6px;overflow:auto}
  </style>
</head>
<body>
  <div class="card">
    <h3>Iniciar sesión</h3>
    <form id="loginForm">
      <label>Email</label>
      <input id="email" type="email" placeholder="*****@gmail.com" required />
        <label>Contraseña</label>
        <input id="password" type="password" placeholder="****" required />
        <div id="loginError" class="error" role="alert" aria-live="polite" style="display:none"></div>
        <button type="submit">Login</button>
    </form>

      <!-- botón de prueba y área de respuesta eliminados -->
  </div>

  <script>
    const loginError = document.getElementById('loginError');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    function showError(msg){
      loginError.textContent = msg || '';
      loginError.style.display = msg ? 'block' : 'none';
    }

    // Clear error when user types
    emailInput.addEventListener('input', ()=> showError(''));
    passwordInput.addEventListener('input', ()=> showError(''));

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      showError('');
      try{
          const apiBase = window.__API_URL__ || '';
          const res = await fetch(apiBase + '/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
        const data = await res.json();
        if(!res.ok){ console.error(data); showError(data.message || 'Error al iniciar sesión'); return; }
        // guardar token y redirigir al dashboard
        localStorage.setItem('token', data.token);
        window.location.href = '/dashboard.html';
      }catch(err){ console.error(err); showError('Error de conexión'); }
    });
  </script>
</body>
</html>
